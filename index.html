<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Viewer Dashboard</title>

  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container mt-5">
    <h1 class="text-center mb-3">Task Viewer Dashboard</h1>

    <p class="subtitle text-center">
      Predefined tasks for a software student
    </p>

    <form class="add-task-form d-flex gap-2 mb-3" onsubmit="addTask(event)">
      <input 
        type="text" 
        id="taskInput" 
        class="form-control"
        placeholder="Enter a new task..." 
      />

      <button type="submit" class="btn btn-success">
        Add Task
      </button>
    </form>

    <div class="filters mb-3 text-center">
      <button onclick="setFilter('all')" class="btn btn-outline-primary">All</button>
      <button onclick="setFilter('active')" class="btn btn-outline-warning">Active</button>
      <button onclick="setFilter('completed')" class="btn btn-outline-success">Completed</button>
    </div>

    <div class="table-responsive mt-3">
      <table class="table table-bordered table-striped align-middle text-center">
        <thead class="table-success">
          <tr>
            <th>Subject / Task</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="taskTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <script src="app.js"></script>
</body>
</html>
