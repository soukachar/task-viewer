<form class="task-form d-flex gap-2 mb-3" onsubmit="addTask(event)">
  <input 
    type="text" 
    id="taskInput" 
    class="form-control border-success"
    placeholder="Enter a new task..." 
  />

  <button type="submit" class="btn btn-success">
    Add Task
  </button>
</form>

<form class="task-form d-flex gap-2 mb-3" onsubmit="searchTasks(event)">
  <input 
    type="text" 
    id="searchInput" 
    class="form-control border-success"
    placeholder="Search a task..." 
  />

  <button type="submit" class="btn btn-success">
    Search
  </button>
</form>
